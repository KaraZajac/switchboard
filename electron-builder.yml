appId: com.switchboard.irc
productName: Switchboard
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintrc,.prettierrc,tsconfig.*}'
  - '!{PLAN,README}.md'
asarUnpack:
  - resources/**
  - node_modules/sql.js/dist/**
icon: resources/icon.png
mac:
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.social-networking
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
linux:
  target:
    - AppImage
    - deb
    - rpm
  maintainer: switchboard-irc
  category: Network;Chat;IRCClient
win:
  target:
    - target: nsis
      arch:
        - x64
  signingHashAlgorithms:
    - sha256
  sign: true
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: switchboard-irc
  repo: switchboard
